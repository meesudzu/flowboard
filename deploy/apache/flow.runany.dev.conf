# Flowboard vhost — reverse-proxy to local Caddy
#
# IMPORTANT: Apache treats the FIRST <VirtualHost *:80> as the fallback for
# any request that doesn't match another vhost's ServerName. To avoid stealing
# all :80 traffic (including requests to the VPS IP and unrelated domains),
# we explicitly declare a default vhost FIRST that serves the original
# DocumentRoot. The flow.runany.dev vhost comes after.

# Server-level directives (must be outside <VirtualHost>)
ServerTokens Prod

# ── Default vhost — anything NOT matching a known ServerName ─────
# Serves from the original DocumentRoot so anything that was on the bare IP
# (like /account/, /, or other apps) keeps working. If you want IP-direct
# access to 404 instead, comment out the DocumentRoot line.
<VirtualHost _default_:80>
    DocumentRoot /var/www/html
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    CustomLog /dev/null combined
    ServerSignature Off
</VirtualHost>

# ── flow.runany.dev — proxy to Caddy :8080 ─────────────────────
<VirtualHost *:80>
    ServerName flow.runany.dev
    # ServerAlias www.flow.runany.dev   # uncomment if you also use www

    ProxyPreserveHost On

    # WS + HTTP via single ProxyPass. mod_proxy_wstunnel detects the
    # Upgrade: websocket header and switches to ws:// backend.
    ProxyPass        /  http://127.0.0.1:8080/ retry=0
    ProxyPassReverse /  http://127.0.0.1:8080/

    CustomLog /dev/null combined
    ServerSignature Off
</VirtualHost>
