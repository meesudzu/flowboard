# Flowboard vhost — reverse-proxy to local Caddy
#
# Drops into:
#   CentOS/RHEL: /etc/httpd/conf.d/flow.runany.dev.conf
#   Debian/Ubuntu: /etc/apache2/sites-available/flow.runany.dev.conf
#
# Required modules (auto-enabled by install-vhost.sh):
#   mod_proxy, mod_proxy_http, mod_proxy_wstunnel
#
# NOTE: We only define a vhost for flow.runany.dev. The Apache default
# vhost (typically serving from /var/www/html/) is left untouched so any
# other sites or IP-direct access continue working as before.

# Server-level directives (must be outside <VirtualHost>)
ServerTokens Prod

# ── flow.runany.dev — proxy to Caddy :8080 ─────────────────────
<VirtualHost *:80>
    ServerName flow.runany.dev
    # ServerAlias www.flow.runany.dev   # uncomment if you also use www

    # Forward the original Host header so Caddy's {$DOMAIN} matches
    ProxyPreserveHost On

    # Single ProxyPass handles both HTTP and WebSocket. When Apache sees
    # Connection: Upgrade + Upgrade: websocket, mod_proxy_wstunnel kicks
    # in automatically and switches the backend transport to ws://.
    ProxyPass        /  http://127.0.0.1:8080/ retry=0
    ProxyPassReverse /  http://127.0.0.1:8080/

    # Don't log proxy traffic twice (Caddy also logs)
    CustomLog /dev/null combined

    # Hide version banner in error pages (allowed inside VirtualHost)
    ServerSignature Off
</VirtualHost>

# Intentionally NO <VirtualHost _default_:80> block here — any existing
# default site on Apache stays untouched. If you want to proxy Flowboard
# for IP-direct access too, copy this <VirtualHost> block and rename to
# _default_:80, but be aware this will shadow whatever was there.
