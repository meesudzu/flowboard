# Flowboard vhost — reverse-proxy to local Caddy
#
# Drops into:
#   CentOS/RHEL: /etc/httpd/conf.d/flow.runany.dev.conf
#   Debian/Ubuntu: /etc/apache2/sites-available/flow.runany.dev.conf
#
# Requires: mod_proxy, mod_proxy_http
#   CentOS: usually loaded by default
#   Debian: a2enmod proxy proxy_http

# Server-level directives (must be outside <VirtualHost>)
ServerTokens Prod

# ── flow.runany.dev — proxy to Caddy :8080 ─────────────────────
<VirtualHost *:80>
    ServerName flow.runany.dev
    # ServerAlias www.flow.runany.dev   # uncomment if you also use www

    # Forward the original Host header so Caddy's {$DOMAIN} matches
    ProxyPreserveHost On

    # Send WS upgrades through (without this, WebSocket handshake fails)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)           ws://127.0.0.1:8080/$1 [P,L]

    # Everything else → Caddy via HTTP proxy
    ProxyPass        / http://127.0.0.1:8080/ retry=0
    ProxyPassReverse / http://127.0.0.1:8080/

    # Don't log proxy traffic twice (Caddy also logs)
    CustomLog /dev/null combined

    # Hide version banner in error pages (allowed inside VirtualHost)
    ServerSignature Off
</VirtualHost>

# Optional: catch-all that responds to any host that isn't flow.runany.dev
# with the existing default site. If you already have a default vhost,
# delete this block — Apache uses the first <VirtualHost _default_:80>
# as fallback.
#<VirtualHost _default_:80>
#    DocumentRoot "/var/www/html"
#</VirtualHost>
